# =============================================================================
# Snap Package — Build, Test, Release, and Publish to Snap Store
#
# SETUP: Snap Store credentials
# ------------------------------
# 1. Register the snap name on https://snapcraft.io (one-time, needs Ubuntu SSO)
# 2. Export credentials:
#      snapcraft export-login \
#        --snaps pj-bridge \
#        --acls package_access,package_push,package_update,package_release \
#        credentials.txt
#      cat credentials.txt   # copy the entire output
# 3. In GitHub → Settings → Secrets → Actions, create a secret named
#    SNAPCRAFT_STORE_CREDENTIALS and paste the credentials.txt content.
#
# CHANNELS
# ---------
#   tag push  → stable   (e.g. v0.5.0 → snapcraft.io/pj-bridge)
# =============================================================================

name: Snap Package

on:
  push:
    tags: ['*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snap:
    runs-on: ubuntu-latest
    outputs:
      snap-file: ${{ steps.build-snap.outputs.snap }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build-snap

      - name: Install snap
        run: sudo snap install --dangerous ${{ steps.build-snap.outputs.snap }}

      - uses: actions/upload-artifact@v4
        with:
          name: snap-amd64
          path: ${{ steps.build-snap.outputs.snap }}

  release:
    needs: snap
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: snap-amd64

      - name: Upload snap to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "$tag" --generate-notes || true
          gh release upload "$tag" *.snap --clobber

  publish:
    needs: snap
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: snap-amd64

      - name: Publish to Snap Store
        uses: canonical/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ needs.snap.outputs.snap-file }}
          release: stable
